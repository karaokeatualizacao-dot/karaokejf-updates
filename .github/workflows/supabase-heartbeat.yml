name: Supabase Heartbeat

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/songs?select=id&limit=1"
